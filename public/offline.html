<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>İnternet bağlantısı yok — OYNAVA</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        background: radial-gradient(1200px 600px at 80% 0%, #1b1430 0%, #0b1326 55%);
        color: #dae2fd; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center; padding: 24px;
      }
      .card { max-width: 420px; }
      .logo { font-size: 44px; font-weight: 800; font-style: italic;
        background: linear-gradient(90deg, #d0bcff, #4cd7f6); -webkit-background-clip: text;
        background-clip: text; color: transparent; }
      h1 { font-size: 22px; margin: 18px 0 8px; }
      p { color: #8b93a7; line-height: 1.6; }
      button {
        margin-top: 22px; padding: 12px 26px; border: 0; border-radius: 12px; cursor: pointer;
        font-size: 15px; font-weight: 700; color: #23005c;
        background: linear-gradient(90deg, #d0bcff, #a078ff);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">OYNAVA</div>
      <h1>İnternet bağlantısı yok 📡</h1>
      <p>Oyunları yükleyebilmek için internet bağlantısı gerekiyor. Bağlantını kontrol edip tekrar dene.</p>
      <button onclick="location.reload()">Tekrar Dene</button>
    </div>
  </body>
</html>
