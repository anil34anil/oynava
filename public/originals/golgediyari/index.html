<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GölgeDiyarı — Oynava Originals</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0b1026;
    font-family:system-ui,Segoe UI,Roboto,sans-serif; touch-action:none; user-select:none; }
  #c { display:block; width:100%; height:100%; }

  #loading { position:fixed; inset:0; display:grid; place-items:center;
    background:#0b1026; z-index:50; color:#cbd5e1; }
  #loading .t { font-size:28px; font-weight:900; letter-spacing:2px;
    background:linear-gradient(90deg,#8b5cf6,#fbbf24); -webkit-background-clip:text;
    background-clip:text; color:transparent; }

  /* HUD kökü — UI adımında (10) doldurulacak */
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; overflow:hidden; }

  /* Yüzen hasar sayıları */
  .dmg { position:absolute; left:0; top:0; font-weight:900; font-size:18px; color:#f8fafc;
    text-shadow:0 1px 3px #000, 0 0 8px rgba(0,0,0,.6); will-change:transform,opacity; }
  .dmg.crit { font-size:26px; color:#fbbf24; }
  .dmg.own { color:#ef4444; }
  .dmg.heal { color:#4ade80; }
  .hidden { display:none !important; }

  /* Üst şerit */
  .hud-top { position:absolute; top:10px; left:14px; right:14px; display:flex; justify-content:space-between; }
  .hud-zone { font-size:13px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; }
  .hud-topright { display:flex; gap:14px; font-weight:800; font-size:14px; }
  .hud-level { color:#c084fc; } .hud-gold { color:#fbbf24; }

  /* Boss barı */
  .hud-boss { position:absolute; top:34px; left:50%; transform:translateX(-50%); width:min(520px,80vw); text-align:center; }
  .hud-boss-name { font-size:13px; font-weight:900; letter-spacing:2px; color:#fca5a5; text-transform:uppercase; }
  .hud-boss-bar { height:10px; margin-top:3px; border:1px solid rgba(255,255,255,.25); border-radius:6px; background:rgba(0,0,0,.5); overflow:hidden; }
  .hud-boss-fill { height:100%; width:100%; background:linear-gradient(90deg,#dc2626,#f97316); transition:width .15s; }

  /* Alt bar */
  .hud-bottom { position:absolute; bottom:26px; left:50%; transform:translateX(-50%); display:flex; align-items:flex-end; gap:14px; }
  .orb { position:relative; width:72px; height:72px; border-radius:50%; border:2px solid rgba(255,255,255,.25);
    background:rgba(0,0,0,.55); overflow:hidden; }
  .orb-fill { position:absolute; left:0; right:0; bottom:0; transition:height .15s; }
  .orb.hp .orb-fill { background:linear-gradient(180deg,#f87171,#b91c1c); }
  .orb.mana .orb-fill { background:linear-gradient(180deg,#60a5fa,#1d4ed8); }
  .orb-text { position:absolute; inset:0; display:grid; place-items:center; font-weight:900; font-size:15px; color:#fff; text-shadow:0 1px 2px #000; }
  .skillbar { display:flex; gap:6px; }
  .skillslot { position:relative; width:52px; height:52px; border-radius:10px; border:2px solid rgba(255,255,255,.2);
    background:rgba(5,8,20,.7); overflow:hidden; }
  .ss-icon { position:absolute; inset:0; display:grid; place-items:center; font-size:24px; }
  .ss-cd { position:absolute; left:0; right:0; bottom:0; background:rgba(0,0,0,.72); }
  .ss-key { position:absolute; right:3px; top:1px; font-size:9px; font-weight:800; color:#94a3b8; }
  .skillslot.locked .ss-icon { filter:grayscale(1); opacity:.3; }
  .skillslot.locked::after { content:"🔒"; position:absolute; inset:0; display:grid; place-items:center; font-size:14px; }
  .skillslot.nomana { border-color:rgba(96,165,250,.5); }
  .xpbar { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); width:min(560px,86vw); height:6px;
    border-radius:4px; background:rgba(255,255,255,.12); overflow:hidden; }
  .xp-fill { height:100%; width:0; background:linear-gradient(90deg,#8b5cf6,#c084fc); transition:width .2s; }

  /* Panel menü butonları */
  .hud-menu { position:absolute; right:12px; bottom:110px; display:flex; flex-direction:column; gap:8px; pointer-events:auto; }
  .hud-btn { width:44px; height:44px; border-radius:10px; border:1px solid rgba(255,255,255,.2);
    background:rgba(5,8,20,.7); font-size:20px; cursor:pointer; }

  /* Paneller */
  .panel { position:absolute; top:52px; left:50%; transform:translateX(-50%); width:min(420px,94vw);
    max-height:calc(100% - 130px); display:flex; flex-direction:column; pointer-events:auto;
    background:rgba(8,12,28,.96); border:1px solid rgba(139,92,246,.4); border-radius:14px;
    box-shadow:0 10px 40px rgba(0,0,0,.6); color:#e2e8f0; }
  .panel-head { display:flex; justify-content:space-between; align-items:center; padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,.1); font-weight:800; }
  .panel-x { background:none; border:none; color:#94a3b8; font-size:16px; cursor:pointer; }
  .panel-body { padding:12px 14px; overflow-y:auto; font-size:13px; }
  .panel-body button { pointer-events:auto; background:#8b5cf6; color:#fff; border:none; border-radius:7px;
    padding:5px 10px; font-weight:700; cursor:pointer; font-size:12px; }
  .eq-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
  .eq-slot { border:1px dashed rgba(255,255,255,.2); border-radius:8px; padding:6px; min-height:34px;
    font-size:11px; cursor:pointer; }
  .eq-slot i { color:#475569; }
  .bag-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; }
  .bag-item { aspect-ratio:1; display:grid; place-items:center; font-size:20px; border-radius:8px;
    border:2px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); cursor:pointer; }
  .bag-item.empty { border-style:dashed; opacity:.35; cursor:default; }
  .bag-item.sel { outline:2px solid #fff; }
  .tt { margin-top:10px; padding:10px; border-radius:10px; background:rgba(255,255,255,.05); }
  .tt-rar { font-size:11px; margin-bottom:4px; }
  .tt-affix { color:#93c5fd; }
  .tt-sock { color:#fbbf24; margin-top:3px; }
  .tt-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .st-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
  .st-row span { flex:1; color:#94a3b8; }
  .st-pts { margin-bottom:6px; color:#c084fc; }
  .tal-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.07); }
  .tal-row > div { flex:1; }
  .tal-rank { color:#c084fc; font-size:11px; }
  .tal-desc { color:#94a3b8; font-size:11px; }

  /* Ölüm + seviye */
  .death-veil { position:absolute; inset:0; display:grid; place-content:center; gap:6px; text-align:center;
    background:rgba(60,0,0,.45); backdrop-filter:blur(2px); }
  .death-text { font-size:44px; font-weight:900; letter-spacing:6px; color:#fca5a5; }
  .death-sub { color:#e2e8f0; }
  .lvl-flash { position:absolute; top:30%; left:50%; transform:translateX(-50%); font-size:34px; font-weight:900;
    letter-spacing:3px; color:#fbbf24; text-shadow:0 0 20px rgba(251,191,36,.7); animation:lvlpop 1.8s ease-out; }
  @keyframes lvlpop { 0%{opacity:0; transform:translateX(-50%) scale(.6);} 15%{opacity:1; transform:translateX(-50%) scale(1.15);} 80%{opacity:1;} 100%{opacity:0;} }

  /* Düşman can barları */
  .ehp { position:absolute; left:0; top:0; width:44px; height:5px; border-radius:3px; background:rgba(0,0,0,.6);
    border:1px solid rgba(0,0,0,.8); overflow:hidden; }
  .ehp i { display:block; height:100%; background:#ef4444; }

  /* Mobil kontroller */
  .joy-zone { position:absolute; left:0; bottom:0; width:45%; height:55%; pointer-events:auto; }
  .joy-base { position:absolute; width:110px; height:110px; margin:-55px 0 0 -55px; border-radius:50%;
    border:2px solid rgba(255,255,255,.25); background:rgba(255,255,255,.06); opacity:0; transition:opacity .15s; }
  .joy-base.on { opacity:1; }
  .joy-knob { position:absolute; left:50%; top:50%; width:48px; height:48px; margin:-24px 0 0 -24px;
    border-radius:50%; background:rgba(255,255,255,.35); }
  .actionpad { position:absolute; right:14px; bottom:120px; display:grid; grid-template-columns:repeat(3,58px);
    gap:10px; pointer-events:auto; }
  .abtn { width:58px; height:58px; border-radius:50%; display:grid; place-items:center; font-size:24px;
    border:2px solid rgba(255,255,255,.25); background:rgba(5,8,20,.6); }
  .abtn.atk { width:72px; height:72px; font-size:30px; grid-column:3; }
  .abtn.on { background:rgba(139,92,246,.5); }

  /* World event bandı + NPC + görev + başarım */
  .we-banner { position:absolute; top:70px; left:50%; transform:translateX(-50%); font-size:20px; font-weight:900;
    letter-spacing:2px; text-shadow:0 2px 8px #000; animation:wepulse 1s ease-in-out infinite alternate; }
  @keyframes wepulse { from{opacity:.75;} to{opacity:1;} }
  .npc-hint { position:absolute; left:0; top:0; padding:3px 10px; border-radius:8px; font-size:12px; font-weight:800;
    background:rgba(251,191,36,.92); color:#1c1300; }
  .q-row { padding:6px 0; }
  .q-prog { color:#4ade80; font-weight:800; margin:2px 0; }
  .ach-toast { position:absolute; top:110px; left:50%; transform:translateX(-50%); padding:8px 18px; border-radius:10px;
    background:rgba(251,191,36,.95); color:#1c1300; font-weight:900; animation:achpop 3.2s ease; }
  @keyframes achpop { 0%{opacity:0; transform:translate(-50%,-8px);} 10%,85%{opacity:1; transform:translate(-50%,0);} 100%{opacity:0;} }

  /* HUD görev takipçisi (sol üst, bölge adının altında) */
  .q-tracker { position:absolute; top:36px; left:14px; max-width:250px; padding:8px 12px; border-radius:10px;
    background:rgba(5,8,20,.55); border:1px solid rgba(139,92,246,.25); font-size:12px; color:#cbd5e1;
    backdrop-filter:blur(4px); }
  .qt-title { font-size:10px; font-weight:900; letter-spacing:2px; color:#8b5cf6; margin-bottom:4px; }
  .qt-q { padding:2px 0; line-height:1.35; }
  .qt-p { color:#4ade80; font-weight:800; }
  .qt-done { color:#64748b; }
  @media (max-width:640px){ .q-tracker { max-width:170px; font-size:11px; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="loading"><div class="t">GÖLGEDİYARI</div></div>
<script src="three.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
